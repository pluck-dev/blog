<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}SEO Admin{% endblock %}</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo",
                 "Pretendard", "Helvetica Neue", sans-serif;
    background: #f8fafc; color: #1e293b; margin: 0;
  }

  /* Buttons */
  .btn, .btn-primary, .btn-danger {
    display: inline-flex; align-items: center; gap: 0.4rem;
    padding: 0.4rem 0.8rem; font-size: 0.85rem; font-weight: 500;
    border-radius: 6px; cursor: pointer; transition: all 0.12s;
    text-decoration: none; line-height: 1.3;
  }
  .btn {
    color: #334155; background: #fff; border: 1px solid #cbd5e1;
  }
  .btn:hover { background: #f1f5f9; }
  .btn-primary {
    color: #fff; background: #2563eb; border: 1px solid #2563eb;
  }
  .btn-primary:hover { background: #1d4ed8; }
  .btn-danger {
    color: #fff; background: #dc2626; border: 1px solid #dc2626;
  }
  .btn-danger:hover { background: #b91c1c; }

  /* Form fields */
  .input {
    width: 100%; padding: 0.4rem 0.6rem; font-size: 0.85rem;
    border: 1px solid #cbd5e1; border-radius: 6px; background: #fff;
    color: #1e293b;
  }
  .input:focus { outline: none; border-color: #2563eb;
                  box-shadow: 0 0 0 3px rgba(37,99,235,0.15); }
  textarea.input { font-family: ui-monospace, "SF Mono", Menlo, monospace;
                    line-height: 1.5; }
  .label {
    display: block; font-size: 0.72rem; font-weight: 600;
    color: #475569; margin-bottom: 0.25rem; letter-spacing: 0.02em;
  }

  /* Badges */
  .badge {
    display: inline-block; padding: 0.15rem 0.5rem;
    font-size: 0.72rem; font-weight: 500; border-radius: 4px;
    line-height: 1.3;
  }
  .bg-slate-100 { background: #f1f5f9; }
  .text-slate-700 { color: #334155; }
  .bg-green-100 { background: #dcfce7; }
  .text-green-700 { color: #15803d; }
  .bg-red-100 { background: #fee2e2; }
  .text-red-700 { color: #b91c1c; }
  .bg-blue-100 { background: #dbeafe; }
  .text-blue-700 { color: #1d4ed8; }
  .bg-orange-100 { background: #ffedd5; }
  .text-orange-700 { color: #c2410c; }
  .bg-purple-100 { background: #f3e8ff; }
  .text-purple-700 { color: #7e22ce; }
  .bg-amber-50 { background: #fffbeb; }
  .border-amber-200 { border-color: #fde68a; }
  .text-amber-800 { color: #92400e; }

  /* Tables */
  table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  th {
    text-align: left; font-weight: 600; color: #334155;
    background: #f8fafc; padding: 0.6rem 0.75rem;
    border-bottom: 1px solid #e2e8f0;
  }
  td {
    padding: 0.6rem 0.75rem; border-bottom: 1px solid #f1f5f9;
    vertical-align: middle;
  }
  tbody tr:hover { background: #fafbfc; }

  /* Cards */
  .card {
    background: #fff; border: 1px solid #e2e8f0; border-radius: 8px;
  }

  /* Code/mono */
  .font-mono, code, pre {
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
  }

  /* Details */
  details > summary { cursor: pointer; user-select: none; list-style: none; }
  details > summary::-webkit-details-marker { display: none; }
</style>
</head>
<body>
<nav style="background:#fff; border-bottom:1px solid #e2e8f0;
            padding: 0.75rem 1.5rem; display:flex; align-items:center;
            justify-content:space-between;">
  <div style="display:flex; align-items:center; gap:1.2rem;">
    <a href="/" style="font-weight:700; color:#0f172a; text-decoration:none;">
      📰 SEO Admin
    </a>
    <a href="/" style="color:#475569; font-size:0.85rem; text-decoration:none;">대시보드</a>
    <a href="/jobs" style="color:#475569; font-size:0.85rem; text-decoration:none;">작업 큐</a>
  </div>
  <div style="font-size:0.72rem; color:#64748b;">claude + codex / 구독제</div>
</nav>
<main style="max-width: 1280px; margin: 0 auto; padding: 1.5rem;">
  {% block body %}{% endblock %}
</main>
</body>
</html>
