{% extends "base.html" %}
{% block title %}로그인{% endblock %}
{% block body %}
<div class="max-w-sm mx-auto mt-20 bg-white p-6 rounded-lg shadow border border-slate-200">
  <h1 class="text-lg font-semibold mb-4">관리자 로그인</h1>
  {% if error %}<div class="mb-3 text-sm text-red-600">인증 실패</div>{% endif %}
  <form method="post" action="/login" class="space-y-3">
    <input type="password" name="password" class="input" placeholder="비밀번호" autofocus>
    <button class="btn-primary w-full justify-center">로그인</button>
  </form>
  <p class="text-xs text-slate-500 mt-4">
    환경변수 <code>ADMIN_PASSWORD</code> 가 비어있으면 누구나 통과 (로컬 전용).
  </p>
</div>
{% endblock %}
