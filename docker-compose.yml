# 양산형 SEO 서버 — 서버 + 워커 2서비스, DB 볼륨 공유.
#
#   docker compose up --build
#
# 생성(LLM)을 쓰려면 호스트의 claude/codex 인증을 마운트해야 한다(아래 volumes 주석 해제).
# 인증 토큰이 호스트 머신에 묶여 있을 수 있어, 같은 머신에서 돌릴 때 가장 안전.

services:
  server:
    build: .
    image: seo-admin:latest
    env_file: [.env]
    environment:
      SEO_DB_PATH: /data/admin.db
      ADMIN_HOST: 0.0.0.0
    ports:
      - "${ADMIN_PORT:-8765}:8765"
    volumes:
      - seo-db:/data
      # 생성용 인증(필요 시 주석 해제):
      # - ${HOME}/.claude:/root/.claude:ro
      # - ${HOME}/.codex:/root/.codex:ro
    command: ["python", "-m", "admin"]
    restart: unless-stopped

  worker:
    build: .
    image: seo-admin:latest
    env_file: [.env]
    environment:
      SEO_DB_PATH: /data/admin.db
    volumes:
      - seo-db:/data
      # - ${HOME}/.claude:/root/.claude:ro
      # - ${HOME}/.codex:/root/.codex:ro
    command: ["python", "-m", "admin.worker"]
    restart: unless-stopped
    depends_on: [server]

volumes:
  seo-db:
